<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanmaSethu Trust (Preview)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soft-pink': '#FDF2F8',
                        'soft-pink-accent': '#FFE5EC',
                        'deep-teal': '#0D9488',
                        'bold-pink': '#EC4899',
                        'warm-white': '#FAFAFA',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect, useRef } = React;

        // --- ICONS (Lucide Wrapper) ---
        // In a real app we import these, here we reference the global lucide object or assume these are available. 
        // For simplicity in this one-file setup, we'll assume the Lucide script loaded them into the DOM 
        // OR we use the SVG versions directly if components aren't available. 
        // Actually, since we included lucide-react via CDN, we might not have the components ready-to-use as React components easily without a build step.
        // We will mock the components with simple SVG placeholders or use the global `lucide.icons` if accessible, but standard SVGs are safer for this preview.

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            // Mapping common icons used
            const icons = {
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                check: <polyline points="20 6 9 17 4 12" />,
                menu: <><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></>,
                x: <><path d="M18 6 6 18" /><path d="M6 6 18 18" /></>,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                chevronLeft: <path d="m15 18-6-6 6-6" />,
                shieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
                coins: <><circle cx="8" cy="8" r="6" /><path d="M18.09 10.37A6 6 0 1 1 10.34 18" /><path d="M7 6h1v4" /><path d="m16.71 13.88.7 .71-2.82 2.82" /></>,
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></>,
                hospital: <><path d="M12 6V4" /><path d="M22 22H2" /><path d="M19 18a4 4 0 0 0-3.38-5.74A4 4 0 0 0 12.5 13h-1A4 4 0 0 0 8 12.26 4 4 0 0 0 5 18v3h14v-3Z" /></>,
                gift: <><rect x="3" y="8" width="18" height="4" rx="1" /><path d="M12 8v13" /><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7" /><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5" /></>,
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
                mail: <><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></>,
                mapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" /><circle cx="12" cy="10" r="3" /></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" x2="12" y1="15" y2="3" /></>,
                play: <polygon points="5 3 19 12 5 21 5 3" />,
                award: <><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></>,
                workflow: <><rect width="8" height="8" x="3" y="3" rx="2" /><path d="M7 11v4a2 2 0 0 0 2 2h4" /><rect width="8" height="8" x="13" y="13" rx="2" /></>
            };

            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill={fill}
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                >
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --- COMPONENTS ---

        const Navigation = ({ onApply, onDonate }) => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/95 backdrop-blur-md shadow-sm py-3' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 md:px-12 flex items-center justify-between">
                        {/* Logo Area */}
                        <div className="flex items-center gap-4">
                            <img src="./logo.png" alt="JanmaSethu Logo" className="h-16 w-auto object-contain" />
                            <a href="https://janmasethu.com/" target="_blank" rel="noopener noreferrer" className="text-3xl font-serif font-bold text-gray-900 tracking-tight hover:text-deep-teal transition">
                                JanmaSethu Trust
                            </a>
                        </div>

                        {/* Right Side Group: Links + Button */}
                        <div className="hidden md:flex items-center gap-8 ml-auto">
                            <div className="flex items-center gap-8 text-gray-800">
                                <button onClick={onApply} className="hover:text-bold-pink transition text-base font-normal">Apply for Grant</button>
                                <button onClick={onDonate} className="hover:text-bold-pink transition text-base font-normal">Donate</button>
                                <a href="#partners" className="hover:text-bold-pink transition text-base font-normal">Partner</a>
                                <a href="#about" className="hover:text-bold-pink transition text-base font-normal">About Us</a>
                            </div>

                            {/* Donate Now Button */}
                            <button onClick={onDonate} className="bg-[#E91E63] text-white px-8 py-2.5 rounded-lg hover:bg-pink-600 transition shadow-md font-medium text-base tracking-wide">
                                Donate Now
                            </button>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-gray-700 ml-auto" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            <Icon name={isMenuOpen ? "x" : "menu"} size={28} />
                        </button>
                    </div>

                    {/* Mobile Drawer */}
                    {isMenuOpen && (
                        <div className="md:hidden absolute top-full left-0 w-full bg-white shadow-xl py-6 px-4 flex flex-col gap-4 border-t border-gray-100">
                            <button onClick={onApply} className="text-left text-lg py-2 text-gray-700 border-b border-gray-50">Apply for Grant</button>
                            <button onClick={onDonate} className="text-left text-lg py-2 text-gray-700 border-b border-gray-50">Donate</button>
                            <a href="#partners" onClick={() => setIsMenuOpen(false)} className="text-lg py-2 text-gray-700 border-b border-gray-50">Partner</a>
                            <a href="#about" onClick={() => setIsMenuOpen(false)} className="text-lg py-2 text-gray-700 border-b border-gray-50">About Us</a>
                            <button onClick={() => { onDonate(); setIsMenuOpen(false); }} className="bg-[#E91E63] text-white px-6 py-3 rounded-lg text-center font-medium mt-2">Donate Now</button>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = ({ onApply, onDonate }) => (
            <section className="relative min-h-[80vh] flex items-center pt-24 pb-16 overflow-hidden bg-gradient-to-r from-white via-[#FFF5F7] to-[#FFF0F5]">

                <div className="container mx-auto px-6 md:px-12 max-w-6xl relative z-10">
                    <div className="flex flex-col lg:flex-row items-center gap-6 lg:gap-10">

                        {/* Left Column: Text Content */}
                        <div className="lg:w-1/2 text-left animate-fade-in-up">

                            {/* Headline - Further Reduced Font Size */}
                            <h1 className="text-3xl md:text-4xl lg:text-5xl font-serif text-gray-900 mb-4 leading-tight tracking-tight">
                                Every Dream of Motherhood <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">Deserves a Bridge</span>
                            </h1>

                            {/* Body Text */}
                            <p className="text-xl text-gray-700 mb-10 leading-relaxed font-light">
                                <a href="https://janmasethu.com/" target="_blank" rel="noopener noreferrer" className="font-medium text-bold-pink hover:underline">Janmasethu</a> believe that every heartbeat is a dream realized, and we are dedicated to helping you bridge the gap to parenthood through the miracle of IVF. Creating the ideal environment for a miracle to begin, we use world-class science to give nature a helping hand.
                            </p>

                            {/* CTA Buttons */}
                            <div className="flex flex-col sm:flex-row gap-4">
                                <button onClick={onDonate} className="group relative bg-[#E91E63] text-white px-6 py-3 rounded-full text-base font-medium hover:bg-pink-600 transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 overflow-hidden w-fit">
                                    <span className="relative z-10 flex items-center gap-2">
                                        Donate Now <Icon name="heart" size={18} fill="currentColor" />
                                    </span>
                                </button>
                            </div>
                        </div>

                        {/* Right Column: Image - Fixed Size Constraint */}
                        <div className="lg:w-1/2 flex justify-center relative animate-fade-in" style={{ animationDelay: '0.3s' }}>
                            <div className="relative rounded-2xl overflow-hidden shadow-xl border-4 border-white max-w-md w-full">
                                <img
                                    src="./hero_mother.jpg"
                                    alt="Mother holding her child with love"
                                    className="w-full h-auto object-cover bg-pink-50/50"
                                />
                                {/* Overlay Gradient */}
                                <div className="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
                            </div>

                            {/* Scaled down decorative elements */}
                            <div className="absolute -top-6 -right-6 w-24 h-24 bg-purple-100 rounded-full blur-xl opacity-60 -z-10"></div>
                            <div className="absolute -bottom-6 -left-6 w-24 h-24 bg-pink-100 rounded-full blur-xl opacity-60 -z-10"></div>
                        </div>

                    </div>
                </div>
            </section>
        );

        const MothersHeart = ({ onApply }) => (
            <section id="about" className="py-20 bg-soft-pink">
                <div className="container mx-auto px-6 md:px-12">
                    <div className="grid md:grid-cols-2 gap-12 items-center">
                        {/* Text Content */}
                        <div className="text-left animate-fade-in-up">
                            <h2 className="text-4xl md:text-5xl font-serif font-bold mb-6 text-gray-900 leading-tight">
                                Turning Hope into <br />
                                <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">Heartbeats</span>
                            </h2>
                            <p className="text-lg text-gray-700 leading-relaxed mb-8 font-light">
                                You have carried the hope of a family within you through every quiet moment and every season of waiting. You know the strength it takes to keep believing when the journey feels long. At JanmaSethu Trust, we honor that resilience by standing beside you as your 'Sakhi'—a devoted companion who understands your silent prayers. We believe that financial hurdles should never stand in the way of a family's joy, providing the hand-holding support you need as you step toward your future.
                            </p>
                            <button onClick={onApply} className="bg-[#E91E63] text-white px-8 py-3.5 rounded-lg text-lg font-medium hover:bg-pink-600 transition shadow-lg hover:shadow-xl hover:-translate-y-1">
                                Apply for Grant
                            </button>
                        </div>

                        {/* Illustration */}
                        <div className="relative animate-fade-in flex justify-center" style={{ animationDelay: '0.2s' }}>
                            <div className="relative rounded-3xl overflow-hidden max-w-sm w-full">
                                <img
                                    src="./hope_heartbeats.jpg"
                                    alt="Mother and Child Heart Silhouette"
                                    className="w-full h-auto object-contain hover:scale-105 transition duration-500"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Stakeholders = () => {
            const cards = [
                { icon: "heart", title: "Get Supported", desc: "Access grants and 24/7 emotional support from Sakhi.", btn: "Find Help", primary: true },
                { icon: "gift", title: "Change a Life", desc: "Your contribution funds the birth of a new family.", btn: "Give Today", primary: false },
                { icon: "hospital", title: "Join the Mission", desc: "Partner with us to provide ethical, subsidized care.", btn: "Partner with Us", primary: false },
            ];
            return (
                <section className="py-24 bg-white">
                    <div className="container mx-auto px-4">
                        <div className="grid md:grid-cols-3 gap-8">
                            {cards.map((c, i) => (
                                <div key={i} className="group p-8 rounded-3xl border border-gray-100 bg-white hover:border-deep-teal/30 hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                                    <div className="mb-6 p-4 bg-gray-50 rounded-2xl w-fit group-hover:bg-white group-hover:shadow-sm">
                                        <Icon name={c.icon} size={40} className={c.primary ? "text-bold-pink" : "text-deep-teal"} />
                                    </div>
                                    <h3 className="text-2xl font-bold font-serif mb-3">{c.title}</h3>
                                    <p className="text-gray-600 mb-8">{c.desc}</p>
                                    <button className={`w-full py-3 rounded-xl font-semibold transition ${c.primary ? 'bg-bold-pink text-white' : 'bg-transparent border-2 border-deep-teal text-deep-teal'}`}>{c.btn}</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const HandOfHope = ({ onDonate }) => {
            const [amount, setAmount] = useState(25000);

            const getImpact = (amt) => {
                if (amt <= 2000) return "Basic diagnostic tests for one couple";
                if (amt <= 10000) return "Initial consultation and screening";
                if (amt <= 25000) return "Complete medications for one IVF cycle";
                if (amt <= 50000) return "One complete IUI treatment";
                if (amt <= 100000) return "One complete IVF cycle";
                return "Full treatment journey with support";
            };

            return (
                <section className="py-24 bg-white relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-teal-50 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 opacity-50"></div>
                    <div className="container mx-auto px-4 relative z-10">
                        <div className="max-w-4xl mx-auto text-center mb-16">
                            <h2 className="text-3xl md:text-5xl font-serif mb-6 text-gray-900">Give the Gift of a New Beginning</h2>
                            <p className="text-xl text-gray-600">Your contribution is the bridge between a dream and a heartbeat</p>
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden max-w-4xl mx-auto">
                            <div className="p-8 md:p-12">
                                <h3 className="text-2xl font-bold font-serif mb-8 text-center text-deep-teal">See Your Impact</h3>
                                <div className="mb-10">
                                    <div className="flex justify-between text-gray-500 mb-2 text-sm font-medium">
                                        <span>₹500</span>
                                        <span>₹1,50,000+</span>
                                    </div>
                                    <input
                                        type="range"
                                        min="500"
                                        max="150000"
                                        step="500"
                                        value={amount}
                                        onChange={(e) => setAmount(Number(e.target.value))}
                                        className="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-bold-pink"
                                    />
                                    <div className="mt-8 text-center p-6 bg-soft-pink rounded-xl border border-pink-100">
                                        <p className="text-gray-500 text-sm uppercase tracking-wide font-semibold mb-2">If I donate <span className="text-bold-pink text-lg">₹{amount.toLocaleString()}</span>, it helps cover:</p>
                                        <p className="text-2xl md:text-3xl font-serif text-deep-teal font-bold animate-pulse">{getImpact(amount)}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                                    {[500, 2000, 5000, 25000, 50000, 100000].map((val) => (
                                        <button key={val} onClick={() => setAmount(val)} className={`py-3 px-4 rounded-xl border transition ${amount === val ? 'border-bold-pink bg-pink-50 text-bold-pink font-bold' : 'border-gray-200 hover:border-deep-teal text-gray-600'}`}>
                                            ₹{val.toLocaleString()}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={onDonate} className="w-full bg-bold-pink text-white py-4 rounded-xl font-bold text-lg hover:bg-pink-600 transition shadow-lg">Donate Now</button>
                                <p className="text-center text-xs text-gray-400 mt-4">All donations are 80G Tax Exempt & 100% Transparent</p>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const HowItWorks = () => (
            <section id="how-it-works" className="py-24 bg-gradient-to-b from-white to-soft-pink">
                <div className="container mx-auto px-4">
                    <h2 className="text-3xl md:text-5xl font-serif mb-16 text-center text-gray-900">How It Works</h2>
                    <div className="grid md:grid-cols-4 gap-8 relative">
                        {/* Connecting Line (Desktop) */}
                        <div className="hidden md:block absolute top-12 left-0 w-full h-0.5 bg-gray-200 -z-10"></div>

                        {[
                            { title: "Application", desc: "Transparent, empathetic screening.", icon: "check" },
                            { title: "Funding", desc: "Donors & Trust pool resources.", icon: "coins" },
                            { title: "Treatment", desc: "Care at top-rated ethical clinics.", icon: "hospital" },
                            { title: "Companion", desc: "24/7 Sakhi emotional support.", icon: "heart" }
                        ].map((step, i) => (
                            <div key={i} className="text-center bg-white md:bg-transparent p-6 rounded-2xl md:p-0 shadow-md md:shadow-none">
                                <div className="w-24 h-24 mx-auto bg-white rounded-full flex items-center justify-center border-4 border-soft-pink shadow-sm mb-6 relative z-10">
                                    <Icon name={step.icon} size={32} className="text-deep-teal" />
                                    <span className="absolute -top-2 -right-2 w-8 h-8 bg-bold-pink text-white rounded-full flex items-center justify-center font-bold text-sm">{i + 1}</span>
                                </div>
                                <h3 className="text-xl font-serif font-bold mb-3">{step.title}</h3>
                                <p className="text-gray-600 text-sm leading-relaxed">{step.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );

        const Clinics = () => (
            <section id="partners" className="py-24 bg-teal-50">
                <div className="container mx-auto px-4">
                    <div className="text-center max-w-3xl mx-auto mb-16">
                        <h2 className="text-3xl md:text-4xl font-serif font-bold text-deep-teal mb-4">Let's Heal Together</h2>
                        <p className="text-gray-600 mb-2">
                            Partner with JanmaSethu to make ethical fertility care accessible. We handle financial screening so you can focus on medical care.
                        </p>
                        <p className="text-deep-teal font-medium">
                            Currently available at <span className="font-bold">Medcy Hospitals</span> in Vijayawada, Vizag, and Hyderabad.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8 mb-16">
                        {[
                            { title: "Streamlined Process", desc: "We handle paperwork & payments.", icon: "link" },
                            { title: "Guaranteed Payments", desc: "Pre-approved costs, zero delays.", icon: "shield" },
                            { title: "Network Recognition", desc: "Join an ethical care network.", icon: "award" }
                        ].map((item, i) => (
                            <div key={i} className="bg-white p-8 rounded-2xl shadow-sm border border-teal-50 hover:shadow-md transition">
                                <div className="text-deep-teal mb-4"><Icon name={item.icon} size={32} /></div>
                                <h3 className="text-xl font-bold mb-2 text-gray-800">{item.title}</h3>
                                <p className="text-gray-500">{item.desc}</p>
                            </div>
                        ))}
                    </div>

                    <div className="text-center">
                        <a href="https://www.medcyhospitals.com/" target="_blank" rel="noopener noreferrer" className="inline-block bg-teal-600 text-white px-8 py-3 rounded-lg font-bold text-lg hover:bg-teal-700 transition shadow-lg hover:shadow-xl hover:-translate-y-1">
                            Partner Clinics
                        </a>
                    </div>
                </div>
            </section>
        );

        const Transparency = () => (
            <section id="impact" className="py-24 bg-white">
                <div className="container mx-auto px-4">
                    <div className="text-center mb-16">
                        <h2 className="text-3xl md:text-5xl font-serif mb-4">100% Transparency. Real Impact.</h2>
                        <p className="text-gray-600">Every rupee is tracked. Every family is celebrated.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center mb-16">
                        <div className="p-6">
                            <div className="text-4xl md:text-5xl font-bold text-deep-teal mb-2">₹45 L</div>
                            <p className="text-gray-500 uppercase tracking-wider text-sm font-semibold">Funds Disbursed</p>
                        </div>
                        <div className="p-6">
                            <div className="text-4xl md:text-5xl font-bold text-bold-pink mb-2">127</div>
                            <p className="text-gray-500 uppercase tracking-wider text-sm font-semibold">Families Assisted</p>
                        </div>
                        <div className="p-6">
                            <div className="text-4xl md:text-5xl font-bold text-deep-teal mb-2">52</div>
                            <p className="text-gray-500 uppercase tracking-wider text-sm font-semibold">Partner Clinics</p>
                        </div>
                    </div>

                    <div className="flex flex-wrap justify-center gap-4 mb-12">
                        {["100% Secure Payments", "80G Tax Exempt", "Verified Partners", "Annual Audits"].map((txt, i) => (
                            <span key={i} className="flex items-center gap-2 bg-gray-50 px-4 py-2 rounded-lg text-sm font-medium text-gray-700">
                                <Icon name="check" size={16} className="text-green-500" /> {txt}
                            </span>
                        ))}
                    </div>

                    <div className="text-center">
                        <button className="inline-flex items-center gap-2 text-deep-teal border border-deep-teal px-6 py-3 rounded-lg hover:bg-teal-50 transition">
